name = "grc-app"
compatibility_date = "2024-01-01"
pages_build_output_dir = ".next/static"

# ── Cloudflare D1 Database ──────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "grc-db"
database_id = "e2f0a2d4-9bfe-4d9d-844d-867f3464b0f8"

# ── Cloudflare Vectorize (ISO document embeddings) ──────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "iso-documents"

# ── Environment variables (secrets set via Cloudflare dashboard) ─────────────
# PERPLEXITY_API_KEY  — set in Cloudflare Pages > Settings > Environment Variables
# AUTH_SECRET         — JWT signing secret
